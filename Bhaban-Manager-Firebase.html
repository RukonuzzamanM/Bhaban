<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDGIXt1t5d5NW_WK3a_clXZxe5yVcp2nN0",
    authDomain: "bhaban-management.firebaseapp.com",
    projectId: "bhaban-management",
    storageBucket: "bhaban-management.firebasestorage.app",
    messagingSenderId: "932633017099",
    appId: "1:932633017099:web:f0b0f3fbc251e406de800e"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  let _uid = null;
  let _unsubscribe = null;
  let _syncPaused = false;

  // Firebase sync functions exposed globally
  window._fbSignIn = async function() {
    try {
      await signInWithPopup(auth, provider);
    } catch(e) {
      alert("লগইন ব্যর্থ হয়েছে: " + e.message);
    }
  };

  window._fbSignOut = async function() {
    if(_unsubscribe) { _unsubscribe(); _unsubscribe = null; }
    await signOut(auth);
    _uid = null;
    window._fbStatus = "signed-out";
    if(window.render) window.render();
  };

  window._fbSave = async function(data) {
    if(!_uid || _syncPaused) return;
    try {
      await setDoc(doc(db, "users", _uid, "data", "main"), { db: JSON.stringify(data), updated: Date.now() });
    } catch(e) {
      console.error("Firebase save error:", e);
    }
  };

  window._fbStatus = "checking";

  onAuthStateChanged(auth, async (user) => {
    if(user) {
      _uid = user.uid;
      window._fbUser = { name: user.displayName, email: user.email, photo: user.photoURL };
      window._fbStatus = "loading";
      if(window.render) window.render();

      // First load from Firebase
      try {
        const snap = await getDoc(doc(db, "users", _uid, "data", "main"));
        if(snap.exists()) {
          const remoteData = JSON.parse(snap.data().db);
          if(remoteData && remoteData.rooms && remoteData.months) {
            _syncPaused = true;
            window._fbMerge(remoteData);
            _syncPaused = false;
          }
        } else {
          // First time: push local data to Firebase
          await window._fbSave(window._getDB());
        }
      } catch(e) {
        console.error("Firebase load error:", e);
      }

      window._fbStatus = "synced";
      if(window.render) window.render();

      // Listen for real-time changes
      if(_unsubscribe) _unsubscribe();
      _unsubscribe = onSnapshot(doc(db, "users", _uid, "data", "main"), (snap) => {
        if(_syncPaused || !snap.exists()) return;
        try {
          const remoteData = JSON.parse(snap.data().db);
          if(remoteData && remoteData.rooms && remoteData.months) {
            _syncPaused = true;
            window._fbMerge(remoteData);
            _syncPaused = false;
            window._fbStatus = "synced";
            if(window.render) window.render();
          }
        } catch(e) {}
      });
    } else {
      _uid = null;
      window._fbUser = null;
      window._fbStatus = "signed-out";
      if(_unsubscribe) { _unsubscribe(); _unsubscribe = null; }
      if(window.render) window.render();
    }
  });
</script>

const SEED_MOBILE =["01608522926","01619214213","","","","01731934327","01724147733","01794816167,01312075380",
"01613164314","01606624289","01776628168","01628597860,01861404077","01623580818","01910530973,01619286443","01760832941",
"01777110372","01765935948","01841237364","01903217773","01943933356","01965812131","01521403319","01718138817","01308262497","01788259579","01717070671"];
const SEED_OCC    =[true,true,true,true,false,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true,true];

const JUNE_PAY=[[0,0,"","","aunty"],[2,0,"","","empty on june 26"],[3,0,"","","empty on june 26"],
 [4,1500,"2026-06-11","cash","1500 dise, bakita aunty k advance — empty on may 26"],[9,4750,"2026-06-11","bkash","4750 dise — ager 500 baki"],
 [10,"full","2026-06-09","rocket","rocket e diese"],[11,2000,"2026-06-11","bkash","2000 tk new varatia diese, c bill baki 2 month"],
 [13,4300,"2026-06-11","rocket","4300 dise"],[15,"full","2026-06-06","bank","dbbl"],[17,"full","2026-06-09","bkash",""],
 [18,"full","2026-06-02","bank","dbbl"],[19,9860,"2026-06-11","bkash","9860 tk"],[21,8540,"2026-05-31","bank","70 taka kom dise, dbbl"],[23,0,"","","rukon"],[25,8470,"2026-06-12","bkash","8470"]];

let _pidc=0; function pid(){ return "p"+Date.now().toString(36)+(_pidc++).toString(36); }
function buildSeed(){
  const rooms=ROOM_NAMES.map((n,i)=>({id:"r"+(i+1),name:n,rent:SEED_RENT[i],garbage:SEED_GARB[i],note:"",tenant:"",mobile:SEED_MOBILE[i],occupied:SEED_OCC[i]}));
  const may={rate:10,expenses:[{n:"বুয়া",a:1500},{n:"ময়লা",a:1500},{n:"পাম্প",a:3000}],advances:[],entries:{}};
  const jun={rate:10,expenses:[],advances:[],entries:{}};
  rooms.forEach((r,i)=>{ const mt=SEED_RENT[i]+SEED_GARB[i]+MAY_ELEC[i]; let mp=mt; if(i===15) mp=mt-70;
    may.entries[r.id]={active:SEED_OCC[i],rent:SEED_RENT[i],garbage:SEED_GARB[i],prevR:READ_APR[i],currR:READ_MAY[i],elecManual:MAY_ELEC[i],paid:mp,date:"",method:"",note:MAY_NOTE[i]||""};

  JUNE_PAY.forEach(([i,paid,date,method,note])=>{ const e=jun.entries["r"+(i+1)]; const total=e.rent+e.garbage; e.paid=paid==="full"?total:paid; e.date=date; e.method=method; e.note=note; });
  return {version:2,settings:{buildingName:"আমার ভবন",unitRate:10},lastBackup:"",rooms,months:{"2026-05":may,"2026-06":jun}};
}

/* ================= state + migration ================= */
const KEY="bhaban-manager-v1";
let DB;
try{ DB=JSON.parse(localStorage.getItem(KEY))||null; }catch(e){ DB=null; }
if(!DB){ DB=buildSeed(); }
function repMob(p){ return (p&&p.mobiles&&p.mobiles[0])||""; }
function roomRep(room){ if(!room||!room.people||!room.people.length) return {name:"",mobiles:[],email:"",nid:""}; return room.people.find(p=>p.isRep)||room.people[0]; }
function migrate(){
  if(!DB.oldTenants) DB.oldTenants=[];
  if(!DB.settings) DB.settings={buildingName:"Rukon's Home",unitRate:10};
  if(!DB.settings.lang) DB.settings.lang="bn";
  if(DB.settings.pin==null) DB.settings.pin="";
  if(DB.settings.buildingName==="আমার ভবন"||!DB.settings.buildingName) DB.settings.buildingName="Rukon's Home";
  DB.rooms.forEach(r=>{ if(!r.people){ const mobs=(r.mobile||"").split(",").map(s=>s.trim()).filter(Boolean); r.people=[]; const nm=r.tenant||"";
      if(!mobs.length) r.people.push({id:pid(),name:nm,mobiles:[],email:"",nid:"",isRep:true});
      else mobs.forEach((m,k)=>r.people.push({id:pid(),name:k===0?nm:"",mobiles:[m],email:"",nid:"",isRep:k===0}));
      delete r.tenant; delete r.mobile; delete r.occupied; }
    r.people.forEach(p=>{ if(p.mobiles==null) p.mobiles=p.mobile?[p.mobile]:[]; delete p.mobile; if(p.nid==null) p.nid=""; if(p.email==null) p.email=""; });
    if(!r.people.some(p=>p.isRep)&&r.people[0]) r.people[0].isRep=true; if(r.note==null) r.note=""; });
  DB.oldTenants.forEach(o=>{ if(o.mobiles==null) o.mobiles=o.mobile?[o.mobile]:[]; if(o.nid==null) o.nid=""; if(o.email==null) o.email=""; });
  Object.values(DB.months).forEach(m=>{ if(!m.advances) m.advances=[];
    Object.keys(m.entries).forEach(rid=>{ const e=m.entries[rid]; const room=DB.rooms.find(x=>x.id===rid); if(!room) return;
      if(e.repName==null){ const rep=roomRep(room); e.repName=rep.name||""; e.repMobile=repMob(rep); } }); });
  DB.version=5; save();
}
migrate();

let curYM=(()=>{ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0"); })();
const NOW_YM=curYM;
if(curYM<"2026-01") curYM="2026-06";
let reportYear=+curYM.split("-")[0];
let curTab="dash";
let locked=!!DB.settings.pin;
let tenantQuery="";
function save(){
  localStorage.setItem(KEY,JSON.stringify(DB));
  if(window._fbSave) window._fbSave(DB);
}
function lang(){ return DB.settings.lang||"bn"; }

// Firebase merge function

window._fbMerge = function(remoteData){

function t(k){ const L=lang(); return (T[L]&&T[L][k])||T.bn[k]||k; }

const BN_MONTHS=["জানুয়ারি","ফেব্রুয়ারি","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টেম্বর","অক্টোবর","নভেম্বর","ডিসেম্বর"];
const EN_MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
function monthName(i){ return lang()==="en"?EN_MONTHS[i]:BN_MONTHS[i]; }
function ymLabel(ym){ const [y,m]=ym.split("-"); return monthName(+m-1)+" "+y; }
function ymShort(ym){ const [y,m]=ym.split("-"); return monthName(+m-1); }
function today(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function moveMonth(d){ let [y,m]=curYM.split("-").map(Number); m+=d; if(m<1){m=12;y--;} if(m>12){m=1;y++;} if(y<2020||y>2100) return; curYM=y+"-"+String(m).padStart(2,"0"); render(); }
function prevYM(ym){ let [y,m]=ym.split("-").map(Number); m--; if(m<1){m=12;y--;} return y+"-"+String(m).padStart(2,"0"); }

function ensureMonth(ym){
  if(!DB.months[ym]) DB.months[ym]={rate:DB.settings.unitRate,expenses:[],advances:[],entries:{}};
  const M=DB.months[ym], P=DB.months[prevYM(ym)];
  DB.rooms.forEach(r=>{ if(!M.entries[r.id]){ const pe=P?P.entries[r.id]:null; const rep=roomRep(r); const active=pe?!!pe.active:true;
    M.entries[r.id]={active,rent:r.rent,garbage:active?r.garbage:0,prevR:pe&&pe.currR!==""&&pe.currR!=null?pe.currR:(pe?pe.prevR:""),currR:"",elecManual:null,paid:0,date:"",method:"",note:"",repName:rep.name||"",repMobile:repMob(rep)}; } });
  return M;
}
function elecBill(e,rate){ if(e.elecManual!=null&&e.elecManual!=="") return +e.elecManual; if(e.currR!==""&&e.currR!=null&&e.prevR!==""&&e.prevR!=null) return Math.max(0,(+e.currR-+e.prevR))*rate; return 0; }
function entryUnits(e){ return (e.currR!==""&&e.currR!=null&&e.prevR!==""&&e.prevR!=null)?Math.max(0,+e.currR-+e.prevR):null; }
function entryTotal(e,rate){ return (+e.rent||0)+(+e.garbage||0)+elecBill(e,rate); }
function fmt(n){ return (+n||0).toLocaleString("en-IN"); }
function entryName(e,room){ return (e&&e.repName)?e.repName:roomRep(room).name; }
function entryMobile(e,room){ return ((e&&e.repMobile)||repMob(roomRep(room))||"").split(",")[0].trim(); }
function dueDetail(roomId,uptoYM){ let prev=0; const prevMonths=[]; let curDue=0;
  Object.keys(DB.months).sort().forEach(k=>{ if(k>uptoYM) return; const M=DB.months[k],e=M.entries[roomId]; if(!e||!e.active) return;
    const d=entryTotal(e,M.rate)-(+e.paid||0); if(k===uptoYM) curDue=Math.max(0,d); else if(d>0.5){ prev+=d; prevMonths.push(ymShort(k)); } });
  return {prev,prevMonths,cur:curDue,total:prev+curDue}; }
function avgElec3(roomId,ym){ const keys=Object.keys(DB.months).filter(k=>k<ym).sort().reverse(); const vals=[];
  for(const k of keys){ if(vals.length>=3) break; const M=DB.months[k],e=M.entries[roomId]; if(!e||!e.active) continue; const b=elecBill(e,M.rate); if(b>0) vals.push(b); }
  if(!vals.length) return 0; return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length); }
function advForRoom(ym,roomId){ const M=DB.months[ym]; return (M.advances||[]).filter(x=>x.room===roomId).reduce((a,x)=>a+(+x.a||0),0); }

/* ================= helpers ================= */
function toast(msg){ const t2=document.getElementById("toast"); t2.textContent=msg; t2.classList.add("show"); setTimeout(()=>t2.classList.remove("show"),2600); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function copyText(txt){ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(()=>toast(t("copy")+" ✓"),()=>{}); }
  else{ const ta=document.createElement("textarea"); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove(); toast(t("copy")+" ✓"); } }
function waChat(mobile){ return "https://wa.me/88"+(mobile||"").replace(/\D/g,""); }
function waLink(mobile,text){ return waChat(mobile)+"?text="+encodeURIComponent(text); }
function callBtn(mob){ return mob?`<a class="btn sm ghost" href="tel:${esc(mob)}">${t("call")}</a>`:""; }
function openModal(html){ const o=document.getElementById("modal"); o.innerHTML=`<div class="modal-card">${html}</div>`; o.style.display="flex"; }
function closeModal(){ document.getElementById("modal").style.display="none"; }

function paintChrome(){
  document.getElementById("monthLabel").textContent=ymLabel(curYM);
  document.getElementById("bname").textContent=DB.settings.buildingName;
  document.getElementById("langBtn").textContent=t("langSwitch");
  document.documentElement.lang=lang(); document.title=DB.settings.buildingName;

  // Firebase button

  if(fbBtn){
    const st = window._fbStatus||"signed-out";
    if(st==="checking"||st==="loading"){

/* ================= PIN lock ================= */

  paintChrome();

  ensureMonth(curYM); save();

  <input id="pinInput" type="password" inputmode="numeric" maxlength="6" placeholder="••••" onkeydown="if(event.key==='Enter')unlockTry()">

function setPin(){ const a=prompt(t("pinAsk")); if(a==null) return; if(!/^\d{4,6}$/.test(a)){ alert("4-6 digits"); return; } const b=prompt(t("pinAsk2")); if(b!==a){ alert(t("pinMismatch")); return; } DB.settings.pin=a; save(); toast(t("pinSaved")); render(); }
function removePin(){ if(!DB.settings.pin) return; const c=prompt(t("pinCur")); if(c!==DB.settings.pin){ alert(t("pinWrong")); return; } DB.settings.pin=""; save(); toast(t("pinRemoved")); render(); }

function monthStats(ym){ const M=DB.months[ym]; let billed=0,paid=0,vacant=0;
  DB.rooms.forEach(r=>{ const e=M.entries[r.id]; if(!e) return; if(!e.active){vacant++;return;} billed+=entryTotal(e,M.rate); paid+=(+e.paid||0); });
  const exp=(M.expenses||[]).reduce((s,x)=>s+(+x.a||0),0); return {billed,paid,exp,vacant,net:paid-exp}; }
function roomStatus(r,M){ const e=M.entries[r.id]; if(!e||!e.active) return "vacant"; const total=entryTotal(e,M.rate); const paid=+e.paid||0; return paid>=total&&total>0?"paid":(paid>0?"partial":"due"); }

/* ---------- Dashboard ---------- */

  const advTot=(M.advances||[]).reduce((a,x)=>a+(+x.a||0),0);
  const rows=[]; let curDueTot=0, prevDueTot=0;
  DB.rooms.forEach(r=>{ const dd=dueDetail(r.id,curYM); if(dd.total>0.5){ curDueTot+=dd.cur; prevDueTot+=dd.prev; rows.push({r,dd}); } });
  rows.sort((a,b)=>b.dd.total-a.dd.total);
  let h=`<div class="cards">
    <div class="card blue"><div class="t">${ymShort(curYM)} — ${t("dash_bill")}</div><div class="v">৳ ${fmt(s.billed)}</div></div>
    <div class="card green"><div class="t">${t("dash_collected")}</div><div class="v">৳ ${fmt(s.paid)}</div></div>
    <div class="card red"><div class="t">${t("dash_dueNow")}</div><div class="v">৳ ${fmt(s.billed-s.paid)}</div></div>
    <div class="card red"><div class="t">${t("dash_prevDue")}</div><div class="v">৳ ${fmt(prevDueTot)}</div></div>
    <div class="card blue"><div class="t">${t("dash_adv")}</div><div class="v">৳ ${fmt(advTot)}</div></div>
    <div class="card ${s.net>=0?'green':'red'}"><div class="t">${t("dash_net")}</div><div class="v">৳ ${fmt(s.net)}</div></div></div>`;

  h+=`<h2>🏢 ${t("overview")} — ${ymShort(curYM)}</h2><div class="grid-rooms">`;
  DB.rooms.forEach(r=>{ const st=roomStatus(r,M); const e=M.entries[r.id]; const dd=dueDetail(r.id,curYM);
    const sub = st==="vacant"?t("vacant"):(st==="paid"?"✓":"৳"+fmt(dd.total));
    h+=`<div class="gcell ${st}" onclick="roomHistory('${r.id}')" title="${esc(r.name)}"><span>${esc(r.name)}</span><small>${sub}</small></div>`; });
  h+=`</div>`;
  h+=`<h2>🔴 ${t("dueListTitle")} — ${ymLabel(curYM)} <button class="btn ghost no-print" onclick="duesImageShare()">${t("duesImg")}</button></h2>
  <div class="panel"><table><thead><tr><th>${t("room")} / ${t("repname")}</th><th class="num">${t("dueNow")}</th><th>${t("prevDueCol")}</th><th class="num">${t("grandtotal")}</th><th class="no-print">${t("reminder")}</th></tr></thead><tbody>`;
  if(!rows.length) h+=`<tr><td colspan="5" style="color:var(--green);font-weight:700">${t("noDue")}</td></tr>`;
  rows.forEach(({r,dd})=>{ const e=M.entries[r.id]; const nm=entryName(e,r); const mob=entryMobile(e,r);
    const prevTxt=dd.prev>0.5?`৳ ${fmt(dd.prev)} <span style="color:var(--muted);font-size:12px">(${dd.prevMonths.join(", ")})</span>`:`<span style="color:var(--muted)">—</span>`;
    h+=`<tr><td><b style="cursor:pointer;text-decoration:underline" onclick="roomHistory('${r.id}')">${esc(r.name)}</b>${nm?`<br><span style="font-size:12px;color:var(--muted)">${esc(nm)} · ${esc(mob||t("noNumber"))}</span>`:""}</td>
      <td class="num">${dd.cur>0.5?"৳ "+fmt(dd.cur):"<span style='color:var(--muted)'>—</span>"}</td><td>${prevTxt}</td><td class="num"><b style="color:var(--red)">৳ ${fmt(dd.total)}</b></td>
      <td class="no-print">${mob?`<a class="btn sm green" target="_blank" href="${waLink(mob,reminderText(r,dd))}">${t("whatsapp")}</a>${callBtn(mob)}`:`<span style='color:var(--muted)'>${t("noNumber")}</span>`}</td></tr>`; });
  h+=`</tbody><tfoot><tr><td>${t("total")}</td><td class="num">৳ ${fmt(curDueTot)}</td><td>৳ ${fmt(prevDueTot)}</td><td class="num">৳ ${fmt(curDueTot+prevDueTot)}</td><td class="no-print"></td></tr></tfoot></table></div>

  return h;

function reminderText(r,dd){ const e=DB.months[curYM].entries[r.id]; const nm=entryName(e,r);
  if(lang()==="en"){ let x=`Assalamu Alaikum${nm?", "+nm:""}. ${r.name} — `;
    if(dd.prev>0.5&&dd.cur>0.5) x+=`Tk ${fmt(dd.cur)} for ${ymShort(curYM)} and previous due Tk ${fmt(dd.prev)} (${dd.prevMonths.join(", ")}), total Tk ${fmt(dd.total)} is due.`;
    else if(dd.prev>0.5) x+=`previous due Tk ${fmt(dd.prev)} (${dd.prevMonths.join(", ")}) is pending.`; else x+=`Tk ${fmt(dd.cur)} for ${ymShort(curYM)} is due.`;
    return x+` Please pay. Thank you. — ${DB.settings.buildingName}`; }
  let txt=`আসসালামু আলাইকুম${nm?", "+nm:""}। ${r.name} — `;
  if(dd.prev>0.5&&dd.cur>0.5) txt+=`${ymShort(curYM)} মাসের ৳${fmt(dd.cur)} এবং আগের বকেয়া ৳${fmt(dd.prev)} (${dd.prevMonths.join(", ")}), সর্বমোট ৳${fmt(dd.total)} বাকি আছে।`;
  else if(dd.prev>0.5) txt+=`আগের বকেয়া ৳${fmt(dd.prev)} (${dd.prevMonths.join(", ")}) এখনো বাকি আছে।`; else txt+=`${ymShort(curYM)} মাসের ৳${fmt(dd.cur)} বাকি আছে।`;
  return txt+` অনুগ্রহ করে পরিশোধ করবেন। ধন্যবাদ। — ${DB.settings.buildingName}`; }

function roomHistory(rid){ const r=DB.rooms.find(x=>x.id===rid);
  const keys=Object.keys(DB.months).filter(k=>k<=NOW_YM).sort();
  let rows=keys.map(k=>{ const M=DB.months[k],e=M.entries[rid]; if(!e) return ""; if(!e.active) return `<tr class="vacant"><td>${ymLabel(k)}</td><td colspan="4">${t("vacant")}</td></tr>`;
    const total=entryTotal(e,M.rate),paid=+e.paid||0,d=total-paid; const cls=paid>=total?"paid":(paid>0?"partial":"");
    return `<tr class="${cls}"><td>${ymLabel(k)}</td><td class="num">৳ ${fmt(total)}</td><td class="num">৳ ${fmt(paid)}</td><td class="num">${d>0.5?"৳ "+fmt(d):"—"}</td><td>${e.method?t("m_"+e.method):""} ${esc(e.date||"")}</td></tr>`; }).join("");
  const rep=roomRep(r);
  openModal(`<div class="flex" style="justify-content:space-between"><h2>📜 ${esc(r.name)}${rep.name?" — "+esc(rep.name):""}</h2><button class="btn ghost sm" onclick="closeModal()">✕ ${t("close")}</button></div>
    <div class="panel"><table style="min-width:0"><thead><tr><th>${lang()==="en"?"Month":"মাস"}</th><th class="num">${t("total")}</th><th class="num">${t("paid")}</th><th class="num">${t("due")}</th><th>${t("method")}/${t("date")}</th></tr></thead><tbody>${rows||"—"}</tbody></table></div>`);
}

    h+=`<tr class="${cls}"><td><b style="cursor:pointer;text-decoration:underline" onclick="roomHistory('${r.id}')">${esc(r.name)}</b>${nm?`<br><span style="font-size:12px;color:var(--muted)">${esc(nm)}</span>`:""}</td>
      <td class="num"><input class="w70 num" type="number" value="${e.rent}" onchange="upE('${r.id}','rent',this.value)" ${e.active?"":"disabled"}></td>
      <td class="num"><input class="w70 num" type="number" value="${e.garbage}" onchange="upE('${r.id}','garbage',this.value)" ${e.active?"":"disabled"}></td>
      <td class="num"><input class="w70 num" type="number" value="${elecBill(e,M.rate)}" onchange="upE('${r.id}','elecManual',this.value)" ${e.active?"":"disabled"}></td>
      <td class="num"><b>${fmt(total)}</b></td>
      <td class="num"><input class="w90 num" type="number" value="${e.paid||""}" placeholder="0" onchange="upE('${r.id}','paid',this.value)" ${e.active?"":"disabled"}></td>
      <td><input class="w110" type="date" value="${e.date||""}" onchange="upE('${r.id}','date',this.value)" ${e.active?"":"disabled"}></td>
      <td><select onchange="upE('${r.id}','method',this.value)" ${e.active?"":"disabled"}>${["","cash","bkash","rocket","nagad","bank"].map(m=>`<option value="${m}" ${e.method===m?"selected":""}>${t("m_"+(m||"none"))}</option>`).join("")}</select></td>
      <td>${badge}</td><td><input class="w110" type="text" value="${esc(e.note)}" onchange="upE('${r.id}','note',this.value)"></td>

    <td class="num">${fmt(s.billed)}</td><td class="num">${fmt(s.paid)}</td><td colspan="5">${t("collDue")}: ৳ ${fmt(s.billed-s.paid)}</td></tr></tfoot></table></div>`;

function upE(id,field,val){ const e=DB.months[curYM].entries[id];
  if(field==="elecManual"){ const u=entryUnits(e); const auto=u!=null?u*DB.months[curYM].rate:null; e.elecManual=(auto!=null&&+val===auto)?null:(val===""?null:+val); }
  else if(["rent","garbage","paid"].includes(field)) e[field]=val===""?0:+val; else e[field]=val; save(); render(); }
function payFull(id){ const M=DB.months[curYM],e=M.entries[id]; e.paid=entryTotal(e,M.rate); if(!e.date) e.date=today(); save(); render(); toast("✓"); }
function payAllFull(){ if(!confirm(ymLabel(curYM)+" — "+t("cfmPayAll"))) return; const M=DB.months[curYM];
  DB.rooms.forEach(r=>{ const e=M.entries[r.id]; if(!e||!e.active) return; const tt=entryTotal(e,M.rate); if((+e.paid||0)<tt){ e.paid=tt; if(!e.date) e.date=today(); } }); save(); render(); toast("✓"); }

/* ---------- Meter ---------- */
function renderMeter(){
  const M=DB.months[curYM]; let totU=0,totB=0,doneN=0,activeN=0;
  let rows=DB.rooms.map(r=>{ const e=M.entries[r.id]; const u=entryUnits(e); const bill=elecBill(e,M.rate); const hasCurr=e.currR!==""&&e.currR!=null;
    if(e.active){ totU+=+u||0; totB+=bill; activeN++; if(hasCurr) doneN++; }
    const pending=e.active&&!hasCurr;
    return `<tr class="${!e.active?"vacant":(pending?"pending":"")}"><td><b>${esc(r.name)}</b>${pending?" ⏳":""}</td>
      <td class="num"><input class="w90 num" type="number" value="${e.prevR}" onchange="upE('${r.id}','prevR',this.value)"></td>
      <td class="num"><input class="w90 num" type="number" value="${e.currR}" placeholder="—" onchange="upE('${r.id}','currR',this.value)"></td>
      <td class="num">${u==null?"—":fmt(u)}</td><td class="num"><b>${fmt(bill)}</b>${e.elecManual!=null?" ✍️":""}</td></tr>`; }).join("");
  const pendN=activeN-doneN;
  const tracker=`<div class="${pendN?'notice':'backup-note'}" style="${pendN?'':'background:var(--green-bg);border-color:#a6dcc0;color:var(--green)'}">${pendN?'⏳':'✓'} ${doneN}/${activeN} ${t("meterDone")}${pendN?` · ${pendN} ${t("meterPending")}`:""}</div>`;
  return `<div class="toolbar"><label>${t("unitRate")}: <input class="w70 num" type="number" value="${M.rate}" onchange="DB.months[curYM].rate=+this.value||0;save();render()"></label>
    <button class="btn" onclick="billImageShare()">${t("groupImg")}</button><button class="btn ghost" onclick="exportMeterCSV()">📥 ${t("csv")}</button>
    <span class="hint">${t("meterHint")}</span></div>${tracker}
  <div class="panel"><table><thead><tr><th>${t("room")}</th><th class="num">${t("prevR")}</th><th class="num">${t("currR")}</th><th class="num">${t("units")}</th><th class="num">${t("elec")} (৳)</th></tr></thead>
  <tbody>${rows}</tbody><tfoot><tr><td>${t("total")}</td><td></td><td></td><td class="num">${fmt(totU)}</td><td class="num">৳ ${fmt(totB)}</td></tr></tfoot></table></div>`;
}

/* ---------- Send bill ---------- */
function billMsg(r){ const M=DB.months[curYM],e=M.entries[r.id]; const eb=elecBill(e,M.rate),total=entryTotal(e,M.rate),u=entryUnits(e); const dd=dueDetail(r.id,prevYM(curYM));
  if(lang()==="en"){ let x=`${DB.settings.buildingName}\nBill for ${ymLabel(curYM)}\nRoom: ${r.name}\nRent: Tk ${fmt(e.rent)}\nGarbage: Tk ${fmt(e.garbage)}\n`;
    x+= u!=null?`Electricity: reading ${e.prevR} → ${e.currR} = ${u} units × ${M.rate} = Tk ${fmt(eb)}\n`:`Electricity: Tk ${fmt(eb)}\n`; x+=`Total: Tk ${fmt(total)}`;
    if(dd.prev>0.5) x+=`\nPrevious due: Tk ${fmt(dd.prev)} (${dd.prevMonths.join(", ")})\nGrand total: Tk ${fmt(total+dd.prev)}`; return x+`\n\n${t("thanks")}`; }
  let txt=`${DB.settings.buildingName}\n${ymLabel(curYM)} মাসের বিল\nরুম: ${r.name}\nঘর ভাড়া: ৳${fmt(e.rent)}\nময়লা বিল: ৳${fmt(e.garbage)}\n`;

function advCarry(yes){ const M=DB.months[curYM],P=DB.months[prevYM(curYM)]; M._advAsked=true;

function filterTenants(q){ q=(q||"").trim().toLowerCase(); document.querySelectorAll("#main .room-card").forEach(c=>{ c.style.display=(!q||(c.dataset.s||"").includes(q))?"":"none"; }); }
function findPerson(rid,pidv){ const r=DB.rooms.find(x=>x.id===rid); return [r,r.people.find(p=>p.id===pidv)]; }
function syncSnap(rid){ const r=DB.rooms.find(x=>x.id===rid); const rep=roomRep(r); const e=DB.months[curYM].entries[rid]; if(e){ e.repName=rep.name||""; e.repMobile=repMob(rep); } }
function upPerson(rid,pidv,f,v){ const [r,p]=findPerson(rid,pidv); if(!p) return; p[f]=v; if(p.isRep) syncSnap(rid); save(); }
function upMobile(rid,pidv,idx,v){ const [r,p]=findPerson(rid,pidv); if(!p) return; if(!p.mobiles) p.mobiles=[]; p.mobiles[idx]=v; p.mobiles=p.mobiles.filter((m,i)=>m.trim()||i===0); if(p.isRep) syncSnap(rid); save(); render(); }
function addMobile(rid,pidv){ const [r,p]=findPerson(rid,pidv); if(!p) return; if(!p.mobiles) p.mobiles=[]; p.mobiles.push(""); save(); render(); }
function delMobile(rid,pidv,idx){ const [r,p]=findPerson(rid,pidv); if(!p) return; p.mobiles.splice(idx,1); if(!p.mobiles.length) p.mobiles=[""]; if(p.isRep) syncSnap(rid); save(); render(); }
function setRep(rid,pidv){ const r=DB.rooms.find(x=>x.id===rid); r.people.forEach(p=>p.isRep=(p.id===pidv)); syncSnap(rid); save(); render(); }
function addPerson(rid){ const r=DB.rooms.find(x=>x.id===rid); r.people.push({id:pid(),name:"",mobiles:[""],email:"",nid:"",isRep:r.people.length===0}); if(r.notice&&!r.notice.inDate) r.notice.inDate=today(); save(); render(); }
function deletePerson(rid,pidv){ const [r,p]=findPerson(rid,pidv); if(!p) return; if(!confirm(t("cfmDelP"))) return;
  r.people=r.people.filter(x=>x.id!==pidv); if(r.people.length&&!r.people.some(x=>x.isRep)) r.people[0].isRep=true; syncSnap(rid); save(); render(); }
function leftTenant(rid,pidv){ const [r,p]=findPerson(rid,pidv); if(!p) return; if(!confirm((p.name||"?")+" — "+t("left")+"?")) return;
  if(p.name||(p.mobiles&&p.mobiles.some(m=>m))||p.email) DB.oldTenants.unshift({name:p.name,mobiles:(p.mobiles||[]).filter(Boolean),email:p.email,nid:p.nid,room:r.name,leftDate:today(),note:""});
  r.people=r.people.filter(x=>x.id!==pidv); if(r.people.length&&!r.people.some(x=>x.isRep)) r.people[0].isRep=true; r.notice={leftName:p.name||"",leftDate:today(),inDate:""}; syncSnap(rid); save(); render(); toast("✓"); }

  <tbody>${rows}</tbody><tfoot><tr><td>${year} ${t("yearTotal")}</td><td class="num">${fmt(tB)}</td><td class="num">${fmt(tP)}</td><td class="num">${fmt(tB-tP)}</td><td class="num">${fmt(tE)}</td><td class="num">${fmt(tP-tE)}</td></tr></tfoot></table></div>
  <h2>🔴 ${t("roomDueTitle")} (${ymLabel(curYM)})</h2>
  <div class="panel"><table><thead><tr><th>${t("room")} / ${t("repname")}</th><th>${t("mobile")}</th><th class="num">${t("due")}</th></tr></thead><tbody>${anyDue?dueRows:`<tr><td colspan="3" style="color:var(--muted)">${t("noDuePlain")}</td></tr>`}</tbody></table></div>`;
}

/* ---------- Backup & settings ---------- */
function renderBackup(){ const days=DB.lastBackup?Math.floor((Date.now()-new Date(DB.lastBackup).getTime())/86400000):null;
  const warn=days==null?t("bkWarnNever"):(days>7?days+" "+t("bkWarnDays"):null);
  const help=lang()==="en"?["⚡ Meter — just type the current reading; the bill calculates itself.","📤 Send Bill — WhatsApp the full bill to each representative in one click.","💰 Rent — tap ✓ Paid; 📤 share / 💬 chat sends a receipt image, 🖨️ prints. Click a room name for its payment history.","📊 Dashboard — building grid + due list; one-click reminders and a dues image for the group.","👥 All Tenants — multiple people per room with multiple numbers, email, NID; mark one representative. 🗑️ deletes a wrong entry, 🚪 archives a departed tenant.","🚪 Former Tenants — change month to see who left that month.","🔒 Set a PIN below to lock the app.","Use ‹ › to move across any year; 📈 Report gives a yearly summary."]
    :["⚡ বিদ্যুৎ মিটার — শুধু “বর্তমান রিডিং” লিখুন, বিল নিজে হিসাব হবে।","📤 বিল পাঠান — প্রতিনিধিদের কাছে এক ক্লিকে পূর্ণ বিল WhatsApp-এ।","💰 ভাড়া আদায় — ✓ জমা; 📤 শেয়ার / 💬 চ্যাট দিয়ে রসিদের ছবি, 🖨️ প্রিন্ট। রুমের নামে ক্লিক করলে পেমেন্ট ইতিহাস।","📊 ড্যাশবোর্ড — ভবনের গ্রিড + বকেয়ার তালিকা; এক ক্লিকে তাগাদা ও গ্রুপের জন্য বকেয়ার ছবি।","👥 সকল ভাড়াটিয়া — এক রুমে একাধিক জন, একাধিক নম্বর, ইমেইল, NID; একজনকে প্রতিনিধি টিক দিন। 🗑️ ভুল এন্ট্রি মোছে, 🚪 চলে যাওয়া ভাড়াটিয়াকে পুরাতন তালিকায় পাঠায়।","🚪 পুরাতন ভাড়াটিয়া — মাস বদলে দেখুন কে কখন গেছে।","🔒 নিচে PIN সেট করে অ্যাপ লক করুন।","‹ › দিয়ে যেকোনো বছরে যান; 📈 রিপোর্টে বছরভিত্তিক সারাংশ।"];
  return `${warn?`<div class="backup-note">⚠️ ${warn} ${t("bkSafe")}</div>`:""}
  <div class="cards" style="max-width:780px">
    <div class="card"><div class="t">${t("bkDownTitle")}</div><p class="hint">${t("bkDownHint")}</p><button class="btn green" onclick="exportJSON()">${t("bkDownBtn")}</button></div>
    <div class="card"><div class="t">${t("bkResTitle")}</div><p class="hint">${t("bkResHint")}</p><input type="file" accept=".json" onchange="importJSON(this)"></div>
    <div class="card"><div class="t">${t("pinTitle")} — ${DB.settings.pin?t("pinOn"):t("pinOff")}</div><p class="hint">${t("pinNote")}</p>
      <div class="flex"><button class="btn" onclick="setPin()">${t("pinSet")}</button>${DB.settings.pin?`<button class="btn red" onclick="removePin()">${t("pinRemove")}</button>`:""}</div></div>
  </div>
  <div class="panel help" style="max-width:780px;margin-top:16px"><b>${t("helpTitle")}</b><ol style="padding-inline-start:20px">${help.map(x=>`<li>${x}</li>`).join("")}</ol></div>`;
}

/* ================= images ================= */
function fallbackDl(blob,fname){ const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=fname; a.click(); URL.revokeObjectURL(a.href); toast(t("toastImg")); }
function shareCanvas(canvas,fname,title){ canvas.toBlob(b=>{ const file=new File([b],fname,{type:"image/png"});
  if(navigator.canShare&&navigator.canShare({files:[file]})){ navigator.share({files:[file],title}).catch(e=>{ if(e.name!=="AbortError") fallbackDl(b,fname); }); } else fallbackDl(b,fname); },"image/png"); }
function imgToWhatsApp(canvas,mobile,fname){ const m=(mobile||"").replace(/\D/g,""); if(m) window.open("https://wa.me/88"+m,"_blank");
  if(navigator.clipboard&&window.ClipboardItem){ try{ const item=new ClipboardItem({"image/png":new Promise(res=>canvas.toBlob(b=>res(b),"image/png"))});
    navigator.clipboard.write([item]).then(()=>toast(t("toastWa"))).catch(()=>canvas.toBlob(b=>fallbackDl(b,fname),"image/png")); }catch(e){ canvas.toBlob(b=>fallbackDl(b,fname),"image/png"); } }
  else canvas.toBlob(b=>fallbackDl(b,fname),"image/png"); }

function listImageCanvas(title, cols, rows, foot){
  const W=720, rowH=32, top=150, footH=foot?46:10, H=top+rows.length*rowH+footH; const cv=document.createElement("canvas"),S=2; cv.width=W*S; cv.height=H*S;
  const ctx=cv.getContext("2d"); ctx.scale(S,S); const F="'Nirmala UI','Noto Sans Bengali',sans-serif";
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,W,H); ctx.fillStyle="#16315e"; ctx.fillRect(0,0,W,84);
  ctx.fillStyle="#fff"; ctx.textAlign="left"; ctx.font="bold 22px "+F; ctx.fillText(DB.settings.buildingName,24,36);
  ctx.font="bold 19px "+F; ctx.fillText(title+" — "+ymLabel(curYM),24,66);
  ctx.fillStyle="#eef2fb"; ctx.fillRect(0,top-26,W,26); ctx.fillStyle="#3b4761"; ctx.font="bold 13px "+F;
  cols.forEach(c=>{ ctx.textAlign=c.a; ctx.fillText(c.t,c.x,top-8); });
  rows.forEach((r,i)=>{ const y=top+i*rowH; if(i%2){ ctx.fillStyle="#f6f8fd"; ctx.fillRect(0,y,W,rowH); }
    ctx.fillStyle=r.dim?"#9aa2b1":"#1d2433"; ctx.font="14px "+F;
    cols.forEach((c,j)=>{ ctx.textAlign=c.a; ctx.fillStyle=(r.colors&&r.colors[j])||(r.dim?"#9aa2b1":"#1d2433"); ctx.fillText(String(r.v[j]),c.x,y+21); });
    ctx.strokeStyle="#e3e7ef"; ctx.beginPath(); ctx.moveTo(0,y+rowH); ctx.lineTo(W,y+rowH); ctx.stroke(); });
  if(foot){ const fy=top+rows.length*rowH; ctx.fillStyle="#eef2fb"; ctx.fillRect(0,fy,W,40); ctx.fillStyle="#16315e"; ctx.font="bold 15px "+F;
    foot.forEach((c,j)=>{ ctx.textAlign=cols[j].a; if(c!=="") ctx.fillText(String(c),cols[j].x,fy+26); }); }
  return cv;
}
function billImageShare(){ const M=DB.months[curYM]; let totU=0,totB=0;
  const rows=DB.rooms.map(r=>{ const e=M.entries[r.id]; const u=entryUnits(e); const bill=elecBill(e,M.rate); if(e.active){totU+=+u||0;totB+=bill;}
    return {dim:!e.active, v:[r.name, e.prevR===""||e.prevR==null?"—":e.prevR, e.currR===""||e.currR==null?"—":e.currR, u==null?"—":u, e.active?fmt(bill):t("vacant")]}; });
  const cols=[{t:t("room"),x:24,a:"left"},{t:t("prevR"),x:360,a:"right"},{t:t("currR"),x:480,a:"right"},{t:t("units"),x:565,a:"right"},{t:t("elec")+" (৳)",x:696,a:"right"}];
  const cv=listImageCanvas(t("elecBillTitle"),cols,rows,[t("total"),"","",fmt(totU),"৳ "+fmt(totB)]); shareCanvas(cv,"elec_bill_"+curYM+".png",t("elecBillTitle")); }
function duesImageShare(){ const M=DB.months[curYM]; const data=[]; let tot=0;
  DB.rooms.forEach(r=>{ const dd=dueDetail(r.id,curYM); if(dd.total>0.5){ tot+=dd.total; const nm=entryName(M.entries[r.id],r);
    data.push({v:[r.name+(nm?" ("+nm+")":""), dd.cur>0.5?fmt(dd.cur):"—", dd.prev>0.5?fmt(dd.prev):"—", fmt(dd.total)], colors:[null,null,null,"#c92a2a"]}); } });
  if(!data.length){ toast(t("noDue")); return; }
  const cols=[{t:t("room")+" / "+t("repname"),x:24,a:"left"},{t:t("dueNow"),x:430,a:"right"},{t:t("prevDueCol"),x:560,a:"right"},{t:t("grandtotal"),x:696,a:"right"}];
  const cv=listImageCanvas(t("duesTitle"),cols,data,[t("total"),"","","৳ "+fmt(tot)]); shareCanvas(cv,"dues_"+curYM+".png",t("duesTitle")); }

function buildReceiptCanvas(title,headLine,lines){
  const W=460, top=170, rowH=38, H=top+lines.length*rowH+90; const cv=document.createElement("canvas"),S=2.5; cv.width=W*S; cv.height=H*S;
  const ctx=cv.getContext("2d"); ctx.scale(S,S); const F="'Nirmala UI','Noto Sans Bengali',sans-serif";
  ctx.fillStyle="#fff"; ctx.fillRect(0,0,W,H); ctx.fillStyle="#16315e"; ctx.fillRect(0,0,W,90);
  ctx.fillStyle="#fff"; ctx.textAlign="center"; ctx.font="bold 22px "+F; ctx.fillText(DB.settings.buildingName,W/2,40); ctx.font="15px "+F; ctx.fillText(title+" — "+ymLabel(curYM),W/2,68);
  ctx.fillStyle="#1d2433"; ctx.textAlign="left"; ctx.font="bold 16px "+F; ctx.fillText(headLine,24,124);
  lines.forEach((ln,i)=>{ const y=top+i*rowH; const bold=ln[0][0]==="_"; const label=bold?ln[0].slice(1):ln[0];
    ctx.font=(bold?"bold ":"")+"16px "+F; ctx.fillStyle=bold?"#16315e":"#333"; ctx.textAlign="left"; ctx.fillText(label,24,y); ctx.textAlign="right"; ctx.fillText(ln[1],W-24,y);
    ctx.strokeStyle=bold?"#16315e":"#e3e7ef"; ctx.lineWidth=bold?1.5:1; ctx.beginPath(); ctx.moveTo(24,y+11); ctx.lineTo(W-24,y+11); ctx.stroke(); });
  const sy=top+lines.length*rowH+30; ctx.strokeStyle="#999"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(40,sy); ctx.lineTo(180,sy); ctx.moveTo(W-180,sy); ctx.lineTo(W-40,sy); ctx.stroke();
  ctx.fillStyle="#666"; ctx.font="12px "+F; ctx.textAlign="center"; ctx.fillText(t("sign_tenant"),110,sy+18); ctx.fillText(t("sign_owner"),W-110,sy+18); return cv;
}
function rentReceiptCanvas(id){ const r=DB.rooms.find(x=>x.id===id),M=DB.months[curYM],e=M.entries[id]; const total=entryTotal(e,M.rate),paid=+e.paid||0,eb=elecBill(e,M.rate),u=entryUnits(e),nm=entryName(e,r);
  const L=[[t("rent"),"৳ "+fmt(e.rent)],[t("garbage"),"৳ "+fmt(e.garbage)],[t("elec"),(u!=null?u+"×"+M.rate+" = ":"")+"৳ "+fmt(eb)],["_"+t("total"),"৳ "+fmt(total)],[t("paid"),"৳ "+fmt(paid)],[t("due"),"৳ "+fmt(Math.max(0,total-paid))]];
  if(e.date) L.push([t("date"),e.date]); if(e.method) L.push([t("method"),t("m_"+e.method)]);
  return {cv:buildReceiptCanvas(t("receiptTitle"),r.name+(nm?" ("+nm+")":""),L), mob:entryMobile(e,r)}; }
function receiptSheet(id){ const x=rentReceiptCanvas(id); shareCanvas(x.cv,"receipt_"+curYM+".png",t("receiptTitle")); }
function receiptChat(id){ const x=rentReceiptCanvas(id); imgToWhatsApp(x.cv,x.mob,"receipt_"+curYM+".png"); }
function receiptPrint(id){ const x=rentReceiptCanvas(id); x.cv.toBlob(b=>{ const url=URL.createObjectURL(b); const w=window.open("","_blank","width=480,height=720");
  w.document.write(`<html><head><meta charset="utf-8"><title>${t("receiptTitle")}</title></head><body style="margin:0;text-align:center"><img src="${url}" style="max-width:100%" onload="window.print()"></body></html>`); w.document.close(); },"image/png"); }
function advReceiptCanvas(rid){ const r=DB.rooms.find(x=>x.id===rid),M=DB.months[curYM],e=M.entries[rid]; const nm=entryName(e,r);
  const items=(M.advances||[]).filter(x=>x.room===rid); const tot=items.reduce((a,x)=>a+(+x.a||0),0);
  const L=items.map(x=>[(x.date||t("date"))+(x.note?" ("+x.note+")":""),"৳ "+fmt(x.a)]); L.push(["_"+t("advTotal"),"৳ "+fmt(tot)]);
  return {cv:buildReceiptCanvas(t("advReceiptTitle"),r.name+(nm?" ("+nm+")":""),L), mob:entryMobile(e,r)}; }
function advReceiptSheet(rid){ const x=advReceiptCanvas(rid); shareCanvas(x.cv,"advance_"+curYM+".png",t("advReceiptTitle")); }
function advReceiptChat(rid){ const x=advReceiptCanvas(rid); imgToWhatsApp(x.cv,x.mob,"advance_"+curYM+".png"); }

/* ================= export / import ================= */
function downloadFile(name,content,type){ const blob=new Blob([content],{type}); const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href); }
function exportJSON(){ DB.lastBackup=new Date().toISOString(); save(); downloadFile(`bhaban-backup-${today()}.json`,JSON.stringify(DB,null,1),"application/json"); toast(t("toastImg")); render(); }
function importJSON(inp){ const f=inp.files[0]; if(!f) return; const rd=new FileReader();
  rd.onload=()=>{ try{ const d=JSON.parse(rd.result); if(!d.rooms||!d.months) throw 0; if(confirm("⚠️ ?")){ DB=d; migrate(); locked=!!DB.settings.pin; render(); toast("✓"); } }catch(e){ alert("⚠️ invalid file"); } }; rd.readAsText(f); }
function csvEsc(v){ v=String(v==null?"":v); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v; }
function dl_csv(name,rows){ downloadFile(name,"﻿"+rows.map(r=>r.map(csvEsc).join(",")).join("\n"),"text/csv;charset=utf-8"); }
function exportRentCSV(){ const M=DB.months[curYM]; let rows=[[t("room"),t("repname"),t("rent"),t("garbage"),t("elec"),t("total"),t("paid"),t("due"),t("date"),t("method"),t("note")]];
  DB.rooms.forEach(r=>{ const e=M.entries[r.id]; if(!e.active){rows.push([r.name,"","","","","","","","","",t("vacant")]);return;} const tt=entryTotal(e,M.rate);
    rows.push([r.name,entryName(e,r),e.rent,e.garbage,elecBill(e,M.rate),tt,e.paid||0,tt-(+e.paid||0),e.date,e.method,e.note]); }); dl_csv(`rent_${curYM}.csv`,rows); }
function exportMeterCSV(){ const M=DB.months[curYM]; let rows=[[t("room"),t("prevR"),t("currR"),t("units"),t("elec")]];
  DB.rooms.forEach(r=>{ const e=M.entries[r.id]; const u=entryUnits(e); rows.push([r.name,e.prevR,e.currR,u==null?"":u,elecBill(e,M.rate)]); }); dl_csv(`meter_${curYM}.csv`,rows); }
function exportYearCSV(year){ let rows=[[lang()==="en"?"Month":"মাস",t("colBill"),t("collected"),t("due"),t("colExp"),t("colNet")]];
  for(let m=1;m<=12;m++){ const ym=year+"-"+String(m).padStart(2,"0"); if(ym>NOW_YM||!DB.months[ym]) continue; const s=monthStats(ym); rows.push([monthName(m-1),s.billed,s.paid,s.billed-s.paid,s.exp,s.paid-s.exp]); } dl_csv(`year_${year}.csv`,rows); }
function exportTenantsCSV(){ let rows=[[t("room"),t("name"),t("mobile"),t("email"),t("nid"),t("repname")]];
  DB.rooms.forEach(r=>r.people.forEach(p=>rows.push([r.name,p.name,(p.mobiles||[]).join(" / "),p.email,p.nid,p.isRep?"✓":""]))); dl_csv("tenants.csv",rows); }
function exportOldCSV(){ let rows=[[t("name"),t("mobile"),t("email"),t("nid"),t("room"),t("leftDate")]];
  DB.oldTenants.forEach(o=>rows.push([o.name,(o.mobiles||[]).join(" / "),o.email,o.nid,o.room,o.leftDate])); dl_csv("former_tenants.csv",rows); }
function advStatusDownload(){ const fmtSel=(document.getElementById("advFmt")||{}).value||"csv"; const data=window._advStatus||[]; const lab={st_none:t("st_none"),st_low:t("st_low"),st_ok:t("st_ok")};
  if(fmtSel==="csv"){ let rows=[[t("room"),t("avgElec"),t("advAmt"),t("status")]]; data.forEach(x=>rows.push([x.name,x.avg,x.amt,lab[x.key]])); dl_csv(`advance_status_${curYM}.csv`,rows); return; }
  const colr={st_none:"#c92a2a",st_low:"#b5530a",st_ok:"#0d8a4f"};
  const cols=[{t:t("room"),x:24,a:"left"},{t:t("avgElec"),x:430,a:"right"},{t:t("advAmt"),x:560,a:"right"},{t:t("status"),x:696,a:"right"}];
  const rows=data.map(x=>({dim:!x.active, v:[x.name,"৳ "+fmt(x.avg),"৳ "+fmt(x.amt),lab[x.key]], colors:[null,null,null,colr[x.key]]}));
  const cv=listImageCanvas(t("advStatusTitle"),cols,rows,null); shareCanvas(cv,`advance_status_${curYM}.png`,t("advStatusTitle")); }

render();
</script>
